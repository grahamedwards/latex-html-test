name: CI 
on: [push] 
jobs: 
  build: 
   runs-on: ubuntu-latest 
   permissions:
      contents: write
   steps: 
   - uses: actions/checkout@v4 
   - name: Run make4ht 
     uses: docker://ghcr.io/michal-h21/make4ht-action:latest 
     env: 
       command: "make4ht -d out main.tex" 
   - name: Publish the web pages 
     uses:  peaceiris/actions-gh-pages@v3 
     with: 
       github_token: ${{ secrets.GITHUB_TOKEN }} 
       publish_dir: ./out 
   - name: copy
     env:
       SRC_FOLDER_PATH: 'main'
       TARGET_BRANCH: 'gh-pages'
     run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git fetch                   # fetch branches
          git checkout gh-pages       # checkout to your branch
          git checkout ${GITHUB_REF##*/} -- grackle-guidelines.pdf # copy files from the source branch
          git add -A
          git diff-index --quiet HEAD ||  git commit -am "deploy files"  # commit to the repository (ignore if no modification)
          git push origin $TARGET_BRANCH # push to remote branch

       
